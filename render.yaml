services:
  - type: web
    name: pensions-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: PENSIONS_STORAGE
        value: postgres
      - key: AGENT_SCHEDULER_ENABLED
        value: "false"
      - key: REQUIRE_AUTH
        value: "false"
      - key: REQUIRE_2FA
        value: "true"
      - key: AUTHENTICATED_USER_ID
        value: alex-morgan
      - key: DATABASE_URL
        fromDatabase:
          name: pensions-dashboard-db
          property: connectionString
      - key: EMAILJS_SERVICE_ID
        sync: false
      - key: EMAILJS_TEMPLATE_ID
        sync: false
      - key: EMAILJS_PUBLIC_KEY
        sync: false
      - key: EMAILJS_PRIVATE_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: POSTMARK_MESSAGE_STREAM
        value: outbound
      - key: AWS_SES_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false

  - type: cron
    name: pensions-dashboard-agent-cron
    runtime: node
    schedule: "0 8 * * *"
    buildCommand: npm install
    startCommand: npm run cron:agent
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: PENSIONS_STORAGE
        value: postgres
      - key: AGENT_SCHEDULER_ENABLED
        value: "false"
      - key: AUTHENTICATED_USER_ID
        value: alex-morgan
      - key: DATABASE_URL
        fromDatabase:
          name: pensions-dashboard-db
          property: connectionString
      - key: EMAILJS_SERVICE_ID
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: EMAILJS_SERVICE_ID
      - key: EMAILJS_TEMPLATE_ID
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: EMAILJS_TEMPLATE_ID
      - key: EMAILJS_PUBLIC_KEY
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: EMAILJS_PUBLIC_KEY
      - key: EMAILJS_PRIVATE_KEY
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: EMAILJS_PRIVATE_KEY
      - key: EMAIL_FROM
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: EMAIL_FROM
      - key: RESEND_API_KEY
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: RESEND_API_KEY
      - key: SENDGRID_API_KEY
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: SENDGRID_API_KEY
      - key: POSTMARK_SERVER_TOKEN
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: POSTMARK_SERVER_TOKEN
      - key: POSTMARK_MESSAGE_STREAM
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: POSTMARK_MESSAGE_STREAM
      - key: AWS_SES_REGION
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: AWS_SES_REGION
      - key: AWS_ACCESS_KEY_ID
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: AWS_SECRET_ACCESS_KEY
      - key: AWS_SESSION_TOKEN
        fromService:
          name: pensions-dashboard
          type: web
          envVarKey: AWS_SESSION_TOKEN

databases:
  - name: pensions-dashboard-db
    plan: free
    databaseName: pensions_dashboard
    user: pensions_dashboard_user
